openapi: 3.0.3

# ─────────────────────────────────────────────────────────────────────────────
# STATUS: Paths, schemas, error model, and pagination/filter params are defined
# and implemented (Sprint 1). Sprint 2 wires this contract into CI as an
# automated contract test (the response schemas are validated against live/mock
# responses). See docs/architecture.md for the DynamoDB access patterns.
# ─────────────────────────────────────────────────────────────────────────────

info:
  title: Device Registry API
  description: >
    Serverless REST API for registering and managing IoT devices.
    Backed by AWS Lambda, API Gateway HTTP API, and DynamoDB.
  version: 0.1.0
  license:
    name: MIT
    url: https://github.com/Joun-Mikhail/device-registry-serverless-api/blob/main/LICENSE

servers:
  - url: https://{apiId}.execute-api.eu-central-1.amazonaws.com/dev
    description: dev environment
    variables:
      apiId:
        default: REPLACE_ME
        description: The API Gateway HTTP API ID from the deployed stack output.

tags:
  - name: Devices
    description: CRUD operations over the device catalogue.

paths:
  /devices:
    get:
      tags: [Devices]
      summary: List devices
      operationId: listDevices
      description: >
        Returns a page of devices. Supports `limit` + `nextToken` cursor
        pagination and `type` filtering (served by the type-createdAt GSI).
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/NextToken'
        - $ref: '#/components/parameters/TypeFilter'
      responses:
        '200':
          description: A page of devices.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Devices]
      summary: Create a device
      operationId: createDevice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceCreate'
      responses:
        '201':
          description: Device created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'

  /devices/{deviceId}:
    parameters:
      - $ref: '#/components/parameters/DeviceId'
    get:
      tags: [Devices]
      summary: Get a device by ID
      operationId: getDevice
      responses:
        '200':
          description: The requested device.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    patch:
      tags: [Devices]
      summary: Partially update a device
      operationId: updateDevice
      description: Only the fields supplied in the body are updated.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceUpdate'
      responses:
        '200':
          description: The updated device.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags: [Devices]
      summary: Delete a device
      operationId: deleteDevice
      responses:
        '200':
          description: Deletion confirmation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResult'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  parameters:
    DeviceId:
      name: deviceId
      in: path
      required: true
      description: UUID v4 identifier of the device.
      schema:
        type: string
        format: uuid
    Limit:
      name: limit
      in: query
      required: false
      description: Maximum number of items to return per page.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
    NextToken:
      name: nextToken
      in: query
      required: false
      description: Opaque pagination cursor returned by a previous call.
      schema:
        type: string
    TypeFilter:
      name: type
      in: query
      required: false
      description: Filter devices by type via the type-createdAt GSI.
      schema:
        $ref: '#/components/schemas/DeviceType'

  schemas:
    DeviceType:
      type: string
      enum: [sensor, actuator, gateway, controller]

    DeviceStatus:
      type: string
      enum: [active, inactive, maintenance]
      default: active

    DeviceCreate:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        type:
          $ref: '#/components/schemas/DeviceType'
        status:
          $ref: '#/components/schemas/DeviceStatus'
        location:
          type: string
          maxLength: 200
          nullable: true
        metadata:
          type: object
          additionalProperties: true
          nullable: true
      additionalProperties: false

    DeviceUpdate:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        type:
          $ref: '#/components/schemas/DeviceType'
        status:
          $ref: '#/components/schemas/DeviceStatus'
        location:
          type: string
          maxLength: 200
          nullable: true
        metadata:
          type: object
          additionalProperties: true
          nullable: true
      additionalProperties: false

    Device:
      type: object
      required: [deviceId, name, type, status, createdAt, updatedAt]
      properties:
        deviceId:
          type: string
          format: uuid
        name:
          type: string
        type:
          $ref: '#/components/schemas/DeviceType'
        status:
          $ref: '#/components/schemas/DeviceStatus'
        location:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      example:
        deviceId: a3f1c2d4-8b5e-4f9a-bc12-d3e4f5a6b7c8
        name: Temperature Sensor A
        type: sensor
        status: active
        location: Building B / Room 12
        metadata:
          firmware: v2.1.0
        createdAt: "2024-11-01T10:30:00.123456+00:00"
        updatedAt: "2024-11-01T10:30:00.123456+00:00"

    DeviceList:
      type: object
      required: [items, count]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Device'
        count:
          type: integer
          description: Number of items in this page.
        nextToken:
          type: string
          nullable: true
          description: Cursor for the next page; absent when there are no more results.
      example:
        items:
          - deviceId: a3f1c2d4-8b5e-4f9a-bc12-d3e4f5a6b7c8
            name: Temperature Sensor A
            type: sensor
            status: active
            createdAt: "2024-11-01T10:30:00.123456+00:00"
            updatedAt: "2024-11-01T10:30:00.123456+00:00"
        count: 1
        nextToken: eyJkZXZpY2VJZCI6ImEzZjFjMmQ0In0=

    DeleteResult:
      type: object
      required: [message]
      properties:
        message:
          type: string
      example:
        message: "Device 'a3f1c2d4-8b5e-4f9a-bc12-d3e4f5a6b7c8' deleted successfully."

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Stable, machine-readable error code.
              enum: [VALIDATION_ERROR, NOT_FOUND, CONFLICT, INTERNAL_ERROR]
            message:
              type: string
              description: Human-readable message. Never contains stack traces.
            details:
              type: object
              additionalProperties: true
              nullable: true
              description: Optional structured context about the error.

  responses:
    BadRequest:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: VALIDATION_ERROR
              message: "'type' must be one of: ['actuator', 'controller', 'gateway', 'sensor']."
    NotFound:
      description: The requested device does not exist.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: NOT_FOUND
              message: Device not found.
    Conflict:
      description: A device with the same ID already exists.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: CONFLICT
              message: A device with this ID already exists.
    InternalError:
      description: An unexpected server error occurred.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: INTERNAL_ERROR
              message: An internal error occurred. Please try again later.
